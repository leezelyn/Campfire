<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜间篝火 · Three.js</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #05080f; }
  #app { width: 100%; height: 100%; }

  #overlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(10,14,26,.92), rgba(3,5,10,.98));
    color: #f3e9d8; font-family: "Segoe UI", system-ui, sans-serif;
    cursor: pointer; user-select: none;
    transition: opacity 1.2s ease;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  /* 启动遮罩期间隐藏操作 UI（参数面板 / HUD / 加柴按钮），进入后随遮罩淡出再淡入 */
  #hud, #addLog, #activityBar, #activityStatus, #panel { transition: opacity .9s ease .35s; }
  #overlay:not(.hidden) ~ #hud,
  #overlay:not(.hidden) ~ #addLog,
  #overlay:not(.hidden) ~ #activityBar,
  #overlay:not(.hidden) ~ #activityStatus,
  #overlay:not(.hidden) ~ #panel { opacity: 0; pointer-events: none; transition: none; }
  #overlay h1 { font-size: 42px; font-weight: 300; letter-spacing: .35em; margin: 0 0 18px; text-indent: .35em; }
  #overlay p  { font-size: 15px; color: #b8a98f; margin: 6px 0; letter-spacing: .1em; }
  #overlay .fire-icon { font-size: 64px; margin-bottom: 24px; animation: breathe 2.4s ease-in-out infinite; }
  @keyframes breathe { 0%,100% { transform: scale(1); opacity:.85 } 50% { transform: scale(1.12); opacity:1 } }

  #hud {
    position: fixed; left: 16px; bottom: 14px; z-index: 5;
    color: rgba(235,220,195,.75); font: 12px/1.7 "Segoe UI", system-ui, sans-serif;
    text-shadow: 0 1px 3px rgba(0,0,0,.9); pointer-events: none; letter-spacing: .04em;
    white-space: pre-line;
  }

  #panel {
    position: fixed; top: 14px; right: 14px; z-index: 6; width: 244px;
    background: rgba(8,12,22,.84); border: 1px solid rgba(255,160,70,.18);
    border-radius: 10px; backdrop-filter: blur(6px);
    font: 12px/1.4 "Segoe UI", system-ui, sans-serif; color: #e8dcc8;
    user-select: none;
  }
  #panelHead {
    padding: 10px 14px; cursor: pointer; letter-spacing: .12em;
    display: flex; justify-content: space-between; align-items: center;
  }
  #panelHead:hover { color: #ffc890; }
  #panelBody { padding: 0 14px 12px; max-height: calc(100vh - 110px); overflow-y: auto; }
  #panel.collapsed #panelBody { display: none; }
  #panelBody::-webkit-scrollbar { width: 6px; }
  #panelBody::-webkit-scrollbar-thumb { background: rgba(255,160,70,.25); border-radius: 3px; }
  .pgroup {
    margin: 12px 0 4px; color: #ffa24d; font-size: 11px; letter-spacing: .25em;
    border-bottom: 1px solid rgba(255,160,70,.15); padding-bottom: 4px;
  }
  .prow { display: grid; grid-template-columns: 1fr auto; gap: 1px 8px; margin: 8px 0; }
  .pname { color: #cfc2ab; }
  .pval  { color: #ffb46a; font-variant-numeric: tabular-nums; }
  .prow input[type=range] {
    grid-column: 1 / -1; width: 100%; height: 16px; margin: 0;
    accent-color: #ff8a3c; cursor: pointer;
  }

  #addLog {
    position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
    z-index: 6; padding: 11px 28px; border-radius: 999px;
    background: rgba(30,18,8,.85); color: #ffc890;
    border: 1px solid rgba(255,160,70,.4);
    font: 15px/1 "Segoe UI", system-ui, sans-serif; letter-spacing: .15em;
    cursor: pointer; backdrop-filter: blur(6px);
    transition: background .15s, box-shadow .15s, opacity .15s;
  }
  #addLog:hover { background: rgba(60,32,12,.9); box-shadow: 0 0 18px rgba(255,140,40,.35); }
  #addLog:active { transform: translateX(-50%) scale(.94); }
  #addLog:disabled { opacity: .45; cursor: default; box-shadow: none; }

  #activityBar {
    position: fixed; left: 50%; bottom: 70px; transform: translateX(-50%);
    z-index: 6; display: flex; gap: 8px;
    padding: 7px; border-radius: 14px;
    background: rgba(8,12,22,.72); border: 1px solid rgba(255,160,70,.16);
    backdrop-filter: blur(8px);
  }
  #activityBar button {
    min-width: 106px; padding: 9px 12px; border-radius: 9px;
    background: rgba(30,18,8,.78); color: #e7d5bc;
    border: 1px solid rgba(255,160,70,.28);
    font: 13px/1 "Segoe UI", system-ui, sans-serif;
    cursor: pointer; transition: color .15s, background .15s, box-shadow .15s, opacity .15s;
  }
  #activityBar button:hover {
    color: #ffc890; background: rgba(60,32,12,.9);
    box-shadow: 0 0 14px rgba(255,140,40,.22);
  }
  #activityBar button:disabled { opacity: .55; cursor: default; box-shadow: none; }
  #activityBar button.active {
    color: #ffd7a4; border-color: rgba(255,176,82,.68);
    background: rgba(76,35,10,.92);
  }
  #activityStatus {
    position: fixed; left: 50%; bottom: 126px; transform: translateX(-50%);
    z-index: 6; min-height: 18px; max-width: 720px;
    color: #ffd19a; font: 12px/1.4 "Segoe UI", system-ui, sans-serif;
    text-align: center; text-shadow: 0 1px 4px #000;
    pointer-events: none; letter-spacing: .04em;
  }

  #langSwitch {
    position: fixed; top: 14px; left: 16px; z-index: 11;   /* 高于启动遮罩，进入前也能切换语言 */
    display: flex; gap: 6px;
  }
  #langSwitch button {
    padding: 6px 11px; border-radius: 999px;
    background: rgba(8,12,22,.84); color: #cfc2ab;
    border: 1px solid rgba(255,160,70,.25);
    font: 12px/1 "Segoe UI", system-ui, sans-serif; letter-spacing: .05em;
    cursor: pointer; backdrop-filter: blur(6px);
    transition: color .15s, background .15s, border-color .15s;
  }
  #langSwitch button:hover { color: #ffc890; }
  #langSwitch button.active {
    background: rgba(60,32,12,.9); color: #ffb46a;
    border-color: rgba(255,160,70,.6);
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="app"></div>
<div id="overlay">
  <div class="fire-icon">🔥</div>
  <h1 id="ovTitle">夜 间 篝 火</h1>
  <p id="ovEnter">点击任意处进入（开启声音）</p>
  <p id="ovHint">拖动旋转 · 滚轮缩放 —— 远离篝火，声音按 1/r 衰减</p>
</div>
<div id="langSwitch">
  <button data-lang="zh" class="active">中</button>
  <button data-lang="en">EN</button>
  <button data-lang="ja">日</button>
</div>
<div id="hud"></div>
<button id="addLog">🪵 加柴</button>
<div id="activityStatus" aria-live="polite"></div>
<div id="activityBar">
  <button id="roastBtn">🍡 烤棉花糖</button>
  <button id="kettleBtn">🫖 煮水</button>
  <button id="torchBtn">🔥 点燃火把</button>
  <button id="pineconeBtn">🌰 投掷松果</button>
</div>
<div id="panel">
  <div id="panelHead"><span id="panelTitle">⚙ 参数调节</span><span id="panelArrow">▾</span></div>
  <div id="panelBody"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ============================================================
   基础场景
   ============================================================ */
const NIGHT = 0x0a1020;
const scene = new THREE.Scene();
scene.background = new THREE.Color(NIGHT);
scene.fog = new THREE.FogExp2(NIGHT, 0.012);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(3.6, 2.0, 5.4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.getElementById('app').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.8, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 1.5;
controls.maxDistance = 45;
controls.maxPolarAngle = Math.PI / 2 - 0.03;

/* ============================================================
   可调参数（右上角滑块面板，运行时实时生效）
   ============================================================ */
const P = {
  fireScale:   1.0,    // 火势：火焰大小、火光强度、轰鸣音量
  buoyancy:    3.8,    // 热浮升力 (m/s²)
  sparkRate:   22,     // 火星生成率 (个/秒)
  smokeRate:   9,      // 烟雾生成率 (个/秒)
  wind:        0.22,   // 风速 (m/s)
  shadowFlick: 0.7,    // 影子闪动:火光投影的快速抖动幅度
  masterVol:   0.9,    // 总音量
  crackleRate: 6,      // 噼啪平均频率 (次/秒)
  rolloff:     1.0,    // 声音距离衰减系数（1 = 物理真实的 1/r）
  airAbsorb:   1.0,    // 空气高频吸收强度
  moonInt:     0.12,   // 月光强度（月牙较弱）
  fog:         0.012,  // 雾浓度
  exposure:    1.1,    // 画面曝光
  rain:        0.0,    // 细雨强度 0..1（雨中火更弱、更多水汽与嘶声、雾更浓）
  cloud:       0.25,   // 云量 0..1：云层厚度与遮月程度
  moonPhase:   138     // 月相角度（度）：0≈满月，90≈上弦，138 标准蛾眉月，180≈新月
};

/* ============================================================
   环境：地面、星空、月亮、树木、石头
   ============================================================ */
// 地面：程序化砂土碎石纹理
function makeGroundTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const g = c.getContext('2d');
  g.fillStyle = '#1f160d';
  g.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 2600; i++) {
    const l = Math.random();
    g.fillStyle = `rgba(${34 + l * 52 | 0},${24 + l * 38 | 0},${15 + l * 24 | 0},${0.3 + Math.random() * 0.45})`;
    const s = 1 + Math.random() * 2;
    g.fillRect(Math.random() * 256, Math.random() * 256, s, s);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(24, 24);
  return tex;
}
const ground = new THREE.Mesh(
  new THREE.CircleGeometry(60, 64),
  new THREE.MeshStandardMaterial({ map: makeGroundTexture(), roughness: 1.0, metalness: 0.0 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// 星空：大气闪烁（scintillation）——低空星光穿过更厚的大气，闪烁越明显；
// 每颗星有独立的相位/速度/振幅
let starMat;
{
  const N = 1800;
  const pos = new Float32Array(N * 3);
  const phase = new Float32Array(N);
  const speed = new Float32Array(N);
  const amp = new Float32Array(N);
  const size = new Float32Array(N);
  const dpr = Math.min(devicePixelRatio, 2);
  for (let i = 0; i < N; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(Math.random() * 0.95);            // 偏向天顶的半球分布
    const r = 380;
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.cos(phi) + 5;
    pos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
    const elev = Math.cos(phi);                              // 1=天顶 0=地平线
    phase[i] = Math.random() * Math.PI * 2;
    speed[i] = 1.5 + Math.random() * 4;
    amp[i]   = 0.12 + 0.33 * (1 - elev);                     // 低空闪烁更强
    size[i]  = (1.0 + Math.random() * 1.9) * dpr;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('aPhase', new THREE.BufferAttribute(phase, 1));
  g.setAttribute('aSpeed', new THREE.BufferAttribute(speed, 1));
  g.setAttribute('aAmp',   new THREE.BufferAttribute(amp, 1));
  g.setAttribute('aSize',  new THREE.BufferAttribute(size, 1));
  starMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: /* glsl */`
      attribute float aPhase;
      attribute float aSpeed;
      attribute float aAmp;
      attribute float aSize;
      varying float vTw;
      uniform float uTime;
      void main() {
        vTw = 1.0 - aAmp * (0.5 + 0.5 * sin(uTime * aSpeed + aPhase));
        gl_PointSize = aSize;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: /* glsl */`
      varying float vTw;
      void main() {
        float dd = length(gl_PointCoord - 0.5);
        float a = smoothstep(0.5, 0.08, dd) * vTw * 0.9;
        if (a < 0.01) discard;
        gl_FragColor = vec4(vec3(0.80, 0.85, 1.0) * vTw, a);
        #include <tonemapping_fragment>
        #include <colorspace_fragment>
      }`,
    transparent: true,
    depthWrite: false
  });
  scene.add(new THREE.Points(g, starMat));
}

// 通用：径向渐变贴图（月晕、炭床余光）
function radialTexture(size, stops) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  for (const [o, col] of stops) grad.addColorStop(o, col);
  g.fillStyle = grad;
  g.fillRect(0, 0, size, size);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

// 月亮（参考图：默认视角左上方，带月晕和云）+ 微弱月光
const moonDir = new THREE.Vector3(-0.86, 0.22, -0.46).normalize();
let moonLight, moonMat, moonHalo, moonSide, moonTLit;   // 由天气系统在 step 里驱动月相/遮月
const clouds = [];                                       // 漂移云层（含基准位与速度）
{
  const moonPos = moonDir.clone().multiplyScalar(330);
  const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), moonDir).normalize();

  // 程序化月面贴图：基底噪声 + 月海暗斑 + 带亮缘的陨石坑
  const moonTex = (() => {
    const S = 512;
    const cv = document.createElement('canvas');
    cv.width = cv.height = S;
    const g = cv.getContext('2d');
    const rng = mulberry32(77);
    g.fillStyle = '#c9c9c4';
    g.fillRect(0, 0, S, S);
    for (let i = 0; i < 9000; i++) {
      const l = (175 + rng() * 70) | 0;
      g.fillStyle = `rgba(${l},${l},${l - 4},${0.10 + rng() * 0.12})`;
      g.fillRect(rng() * S, rng() * S, 1 + rng() * 2.5, 1 + rng() * 2.5);
    }
    g.filter = 'blur(16px)';                       // 月海
    for (let i = 0; i < 7; i++) {
      g.fillStyle = `rgba(118,120,124,${0.35 + rng() * 0.25})`;
      g.beginPath();
      g.ellipse(rng() * S, rng() * S, 36 + rng() * 70, 26 + rng() * 50, rng() * 3, 0, 7);
      g.fill();
    }
    for (let i = 0; i < 70; i++) {                 // 陨石坑：暗底 + 偏移亮缘
      const x = rng() * S, y = rng() * S, r = 2.5 + rng() * rng() * 15;
      g.filter = `blur(${Math.max(0.5, r * 0.12)}px)`;
      g.fillStyle = `rgba(95,95,96,${0.32 + rng() * 0.22})`;
      g.beginPath(); g.arc(x, y, r, 0, 7); g.fill();
      g.strokeStyle = `rgba(235,235,228,${0.30 + rng() * 0.25})`;
      g.lineWidth = Math.max(1, r * 0.22);
      g.beginPath(); g.arc(x - r * 0.12, y - r * 0.12, r, -2.7, 0.5); g.stroke();
    }
    const t = new THREE.CanvasTexture(cv);
    t.colorSpace = THREE.SRGBColorSpace;
    return t;
  })();

  // 3D 月球：真实球体几何 + 按太阳方向的朗伯明暗（凸月相、明暗界线、暗面地照）
  // 用相位角精确构造太阳方向：S = (月→地)·cosα + 切向·sinα
  // α=138° → 受光面 (1+cosα)/2 ≈ 13%，标准蛾眉月，弯口朝画面左下
  const PHASE = THREE.MathUtils.degToRad(138);
  const tLit = new THREE.Vector3()
    .addScaledVector(side, -0.94)        // 受光缘朝画面右侧
    .setY(0.34)                          // 略偏上 → 月牙双角指向左下
    .normalize();
  tLit.addScaledVector(moonDir, -tLit.dot(moonDir)).normalize();   // 正交化到视线垂面
  const sunDirW = moonDir.clone().multiplyScalar(-Math.cos(PHASE))
    .addScaledVector(tLit, Math.sin(PHASE))
    .normalize();
  const moon = new THREE.Mesh(
    new THREE.SphereGeometry(11, 48, 48),
    new THREE.ShaderMaterial({
      uniforms: {
        uMap: { value: moonTex },
        uSunDir: { value: sunDirW },
        uDim: { value: 1 }                       // 云层遮月时整体压暗
      },
      vertexShader: /* glsl */`
        varying vec3 vNormal;
        varying vec2 vUv;
        void main() {
          vNormal = normalize(mat3(modelMatrix) * normal);
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }`,
      fragmentShader: /* glsl */`
        varying vec3 vNormal;
        varying vec2 vUv;
        uniform sampler2D uMap;
        uniform vec3 uSunDir;
        uniform float uDim;
        void main() {
          float d = clamp(dot(normalize(vNormal), uSunDir), 0.0, 1.0);
          float l = 0.06 + 2.1 * d;                // 0.06 ≈ 地照："新月抱旧月"的暗面微光
          vec3 col = texture2D(uMap, vUv).rgb * l * uDim;
          gl_FragColor = vec4(col, 1.0);
          #include <tonemapping_fragment>
          #include <colorspace_fragment>
        }`
    })
  );
  moon.position.copy(moonPos);
  moon.rotation.y = 1.6;
  scene.add(moon);
  moonMat = moon.material; moonSide = side.clone(); moonTLit = tLit.clone();

  // 月晕
  const halo = new THREE.Sprite(new THREE.SpriteMaterial({
    map: radialTexture(128, [
      [0, 'rgba(190,210,255,0.35)'], [0.25, 'rgba(150,175,230,0.14)'], [1, 'rgba(120,150,210,0)']
    ]),
    transparent: true, depthWrite: false, fog: false, blending: THREE.AdditiveBlending
  }));
  halo.position.copy(moonPos);
  halo.scale.setScalar(78);
  scene.add(halo);
  moonHalo = halo;

  // 月旁的云（柔和椭圆叠加的画布贴图）
  const cloudTex = (() => {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 128;
    const g = c.getContext('2d');
    g.filter = 'blur(13px)';
    const rng = mulberry32(31);
    for (let i = 0; i < 10; i++) {
      g.fillStyle = `rgba(255,255,255,${0.10 + rng() * 0.14})`;
      g.beginPath();
      g.ellipse(48 + rng() * 160, 42 + rng() * 44, 18 + rng() * 34, 9 + rng() * 13, 0, 0, 7);
      g.fill();
    }
    const t = new THREE.CanvasTexture(c);
    t.colorSpace = THREE.SRGBColorSpace;
    return t;
  })();
  const rng = mulberry32(63);
  for (let i = 0; i < 7; i++) {
    const baseOp = 0.35 + rng() * 0.3;
    const cl = new THREE.Sprite(new THREE.SpriteMaterial({
      map: cloudTex, color: 0x8ea3c8, transparent: true,
      opacity: baseOp, depthWrite: false, fog: false
    }));
    const sideOff = (rng() - 0.5) * 360;                       // 沿天空横向铺开（含画面外，供漂移轮回）
    const base = moonPos.clone().add(new THREE.Vector3(0, (rng() - 0.55) * 60, 0));
    cl.position.copy(base).addScaledVector(side, sideOff);
    cl.scale.set(120 + rng() * 90, 34 + rng() * 22, 1);
    scene.add(cl);
    // 缓慢横向漂移：风越大云走得越快；off 在 ±240 间轮回
    clouds.push({ sprite: cl, base, off: sideOff, baseOp, speed: 2 + rng() * 5 });
  }

  moonLight = new THREE.DirectionalLight(0x91a8d0, 0.12);   // 月牙的环境月光更弱
  moonLight.position.copy(moonDir).multiplyScalar(50);
  scene.add(moonLight);

  scene.add(new THREE.HemisphereLight(0x202c44, 0x0a0c08, 0.22));
}

// 设置月相：由相位角重算太阳方向 S = (月→地)·(-cosα) + 切向·sinα
function setMoonPhase(deg) {
  if (!moonMat) return;
  const ph = THREE.MathUtils.degToRad(deg);
  moonMat.uniforms.uSunDir.value.copy(moonDir).multiplyScalar(-Math.cos(ph))
    .addScaledVector(moonTLit, Math.sin(ph)).normalize();
}

// 远山剪影
{

function placeProp(group, az, r, faceIn = true) {
  group.position.set(Math.cos(az) * r, 0, Math.sin(az) * r);
  if (faceIn) group.rotation.y = Math.atan2(-Math.cos(az), -Math.sin(az));   // 正面（+Z）朝火堆
  group.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
  scene.add(group);
}

// 帐篷：三角棱柱（脊形帐），+Z 端开一道暗门朝火
function makeTent() {
  const g = new THREE.Group();
  const W = 1.5, H = 1.05, D = 1.9;
  const tri = new THREE.Shape();
  tri.moveTo(-W / 2, 0); tri.lineTo(W / 2, 0); tri.lineTo(0, H); tri.closePath();
  const geo = new THREE.ExtrudeGeometry(tri, { depth: D, bevelEnabled: false });
  geo.translate(0, 0, -D / 2);
  const fab = new THREE.MeshStandardMaterial({ color: 0x2f5d4a, roughness: 0.92, side: THREE.DoubleSide });
  g.add(new THREE.Mesh(geo, fab));
  const door = new THREE.Mesh(new THREE.PlaneGeometry(W * 0.34, H * 0.66),
    new THREE.MeshStandardMaterial({ color: 0x0a0f0c, roughness: 1 }));
  door.position.set(0, H * 0.32, D / 2 + 0.004);
  g.add(door);
  return g;
}

// 折叠椅：座面 + 斜靠背 + 四条角腿（腿长=座高，顶端贴座底、底端落地，轻微外八不交叉）
function makeChair() {
  const g = new THREE.Group();
  const frame = new THREE.MeshStandardMaterial({ color: 0x20242a, roughness: 0.6, metalness: 0.3 });
  const fab = new THREE.MeshStandardMaterial({ color: 0x7a2d2d, roughness: 0.9 });
  const seatY = 0.3, w = 0.42, d = 0.42;
  const seat = new THREE.Mesh(new THREE.BoxGeometry(w, 0.05, d), fab);
  seat.position.y = seatY; g.add(seat);
  const back = new THREE.Mesh(new THREE.BoxGeometry(w, 0.34, 0.04), fab);
  back.position.set(0, seatY + 0.19, -d / 2 + 0.03); back.rotation.x = -0.12; g.add(back);
  const legGeo = new THREE.CylinderGeometry(0.018, 0.014, seatY, 8);   // 腿长 = 座高
  const inset = 0.055, splay = 0.05;
  for (const sx of [-1, 1]) for (const sz of [-1, 1]) {
    const leg = new THREE.Mesh(legGeo, frame);
    leg.position.set(sx * (w / 2 - inset), seatY / 2, sz * (d / 2 - inset));   // 中心居中 → 顶=座底、底=地面
    leg.rotation.z = -sx * splay; leg.rotation.x = sz * splay;                 // 四角各自轻微外八
    g.add(leg);
  }
  return g;
}

// 背包：圆鼓的软袋（胶囊体）+ 扁圆顶盖 + 前袋 + 弯肩带 + 提环（不再方正）
function makeBackpack() {
  const g = new THREE.Group();
  const m = new THREE.MeshStandardMaterial({ color: 0x3a4b2c, roughness: 0.95 });
  const m2 = new THREE.MeshStandardMaterial({ color: 0x2a3720, roughness: 0.95 });
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.16, 0.2, 6, 16), m);
  body.scale.set(1.05, 1, 0.72); body.position.y = 0.27; g.add(body);            // 鼓胀软袋
  const lid = new THREE.Mesh(new THREE.SphereGeometry(0.16, 16, 12), m);
  lid.scale.set(1.06, 0.52, 0.75); lid.position.y = 0.46; g.add(lid);            // 扁圆顶盖
  const pocket = new THREE.Mesh(new THREE.CapsuleGeometry(0.11, 0.08, 5, 14), m2);
  pocket.scale.set(1, 1, 0.5); pocket.position.set(0, 0.2, 0.14); g.add(pocket); // 前袋（贴前面）
  for (const sx of [-0.08, 0.08]) {
    const strap = new THREE.Mesh(new THREE.CapsuleGeometry(0.022, 0.3, 4, 8), m2);
    strap.position.set(sx, 0.3, -0.15); strap.rotation.x = 0.16; g.add(strap);   // 弯肩带（背面）
  }
  const loop = new THREE.Mesh(new THREE.TorusGeometry(0.04, 0.012, 6, 12), m2);
  loop.position.set(0, 0.54, -0.02); loop.rotation.x = Math.PI / 2; g.add(loop); // 顶部提环
  return g;
}

// 简单可复现的随机数（树木布局固定）
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* ============================================================
   粒子着色器（火焰 / 火星 / 烟共用，程序化圆形光斑）
   ============================================================ */
function makeParticleMaterial(softness, blending) {
  return new THREE.ShaderMaterial({
    uniforms: { uScale: { value: 1 } },
    vertexShader: /* glsl */`
      attribute float aSize;
      attribute vec3  aColor;
      attribute float aAlpha;
      varying vec3 vColor;
      varying float vAlpha;
      uniform float uScale;
      void main() {
        vColor = aColor;
        vAlpha = aAlpha;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = aSize * uScale / max(0.1, -mv.z);
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: /* glsl */`
      varying vec3 vColor;
      varying float vAlpha;
      void main() {
        float d = length(gl_PointCoord - 0.5);
        float a = smoothstep(0.5, ${softness}, d) * vAlpha;
        if (a < 0.003) discard;
        gl_FragColor = vec4(vColor, a);
      }`,
    transparent: true,
    depthWrite: false,
    blending
  });
}

function makeParticleSystem(count, softness, blending) {
  const g = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  const sz  = new Float32Array(count);
  const al  = new Float32Array(count);
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('aColor',   new THREE.BufferAttribute(col, 3));
  g.setAttribute('aSize',    new THREE.BufferAttribute(sz, 1));
  g.setAttribute('aAlpha',   new THREE.BufferAttribute(al, 1));
  const mat = makeParticleMaterial(softness, blending);
  const points = new THREE.Points(g, mat);
  points.frustumCulled = false;
  scene.add(points);
  return { g, pos, col, sz, al, mat, points };
}

function updateScales() {
  // 把粒子的"世界尺寸"换算到屏幕像素：size * (h / 2tan(fov/2)) / z
  const s = renderer.domElement.height / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov) / 2));
  for (const ps of [flameSys, sparkSys, smokeSys, rainSys, fireflySys]) ps.mat.uniforms.uScale.value = s;
}

  [[0.00, 1.00, 1.00, 0.88], [0.40, 1.00, 0.86, 0.42], [0.75, 1.00, 0.60, 0.14], [1.00, 0.80, 0.30, 0.04]],
  // 外焰：橙 → 深红 → 暗熄（绿分量低，叠加后仍保持红橙色相）
  [[0.00, 1.00, 0.50, 0.10], [0.35, 0.95, 0.30, 0.04], [0.70, 0.65, 0.12, 0.015], [1.00, 0.18, 0.02, 0.00]],
  // 焰底：幽蓝
  [[0.00, 0.30, 0.50, 1.00], [0.55, 0.18, 0.32, 0.85], [1.00, 0.05, 0.10, 0.35]]
];

const flames = [];
for (let i = 0; i < FLAME_N; i++) flames.push(spawnFlame({}, Math.random()));
// 火焰的发光质心：投影光源跟随它，影子随风摆动
const flameCentroid = new THREE.Vector3().copy(FIRE_POS);

function spawnFlame(p, lifeFrac = 0) {
  const u = Math.random();
  p.layer = u < 0.42 ? 0 : (u < 0.93 ? 1 : 2);
  const a = Math.random() * Math.PI * 2;
  if (p.layer === 0) {                       // 内焰：窄核心柱（升不高，留出红色焰尖）
    const r = 0.10 * Math.sqrt(Math.random());
    p.x = Math.cos(a) * r; p.z = Math.sin(a) * r;
    p.y = 0.14 + Math.random() * 0.2;
    p.vy = 0.8 + Math.random() * 0.6;
    p.maxLife = 0.3 + Math.random() * 0.35;
  } else if (p.layer === 1) {                // 外焰：环形包络，升得更高
    const r = 0.15 + 0.20 * Math.sqrt(Math.random());
    p.x = Math.cos(a) * r; p.z = Math.sin(a) * r;
    p.y = 0.08 + Math.random() * 0.26;
    p.vy = 0.7 + Math.random() * 1.1;
    p.maxLife = 0.7 + Math.random() * 0.95;
  } else {                                   // 焰底：贴地蓝光环
    const r = 0.16 + 0.16 * Math.random();
    p.x = Math.cos(a) * r; p.z = Math.sin(a) * r;
    p.y = 0.05 + Math.random() * 0.08;
    p.vy = 0.25 + Math.random() * 0.35;
    p.maxLife = 0.3 + Math.random() * 0.3;
  }
  p.vx = (Math.random() - 0.5) * 0.25;
  p.vz = (Math.random() - 0.5) * 0.25;
  p.life = lifeFrac * p.maxLife;
  p.seed = Math.random() * 100;
  return p;
}

// 按层取色：f 为归一化生命（温度冷却进度）
function flameColor(f, ramp, out) {
  for (let i = 0; i < ramp.length - 1; i++) {
    if (f <= ramp[i + 1][0]) {
      const t = (f - ramp[i][0]) / (ramp[i + 1][0] - ramp[i][0]);
      out[0] = ramp[i][1] + (ramp[i + 1][1] - ramp[i][1]) * t;
      out[1] = ramp[i][2] + (ramp[i + 1][2] - ramp[i][2]) * t;
      out[2] = ramp[i][3] + (ramp[i + 1][3] - ramp[i][3]) * t;
      return;
    }
  }
}

const _c = [0, 0, 0];
function updateFlames(dt, t, flick) {
  const BUOY = P.buoyancy, DRAG = 1.3;
  let fcx = 0, fcy = 0, fcz = 0, fw = 0;
  for (let i = 0; i < FLAME_N; i++) {
    const p = flames[i];
    p.life += dt;
    if (p.life >= p.maxLife) spawnFlame(p);
    const f = p.life / p.maxLife;
    const L = FLAME_LAYERS[p.layer];

    p.vy += BUOY * L.buoy * (1.0 - 0.55 * f) * dt;             // 热气浮升力（随冷却减弱）
    const k = Math.max(0, 1 - DRAG * dt);                       // 空气阻力
    p.vx *= k; p.vy *= k; p.vz *= k;
    const turb = 1.5 * L.turbK;                                 // 外焰湍流强、内焰平稳
    p.vx += Math.sin(t * 3.1 + p.seed * 1.7 + p.y * 2.2) * turb * dt;
    p.vz += Math.cos(t * 2.6 + p.seed * 2.3 + p.y * 2.2) * turb * dt;
    p.vx += windVX * 1.4 * L.windK * dt;                        // 受风（矢量：含风向）
    p.vz += windVZ * 1.4 * L.windK * dt;
    p.vx += -p.x * L.converge * dt;                             // 内焰强收束成窄核心柱
    p.vz += -p.z * L.converge * dt;
    p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;

    flameSys.pos[i*3] = p.x; flameSys.pos[i*3+1] = p.y; flameSys.pos[i*3+2] = p.z;
    flameColor(f, FLAME_RAMPS[p.layer], _c);
    flameSys.col[i*3] = _c[0]; flameSys.col[i*3+1] = _c[1]; flameSys.col[i*3+2] = _c[2];
    flameSys.sz[i] = (L.size * (1 - 0.72 * f) + 0.05) * (0.85 + 0.3 * flick) * (0.55 + 0.45 * fireDrive);
    flameSys.al[i] = Math.pow(Math.sin(Math.PI * Math.min(1, f * 1.15)), 0.7) * 0.85 * L.alphaK * (0.28 + 0.72 * fireHealth);   // 火势弱时焰体淡去，只剩余烬
    // 内焰最亮，对发光质心的贡献最大
    const wgt = flameSys.al[i] * (1.2 - f) * (p.layer === 0 ? 1.5 : p.layer === 1 ? 0.7 : 0.15);
    fcx += p.x * wgt; fcy += p.y * wgt; fcz += p.z * wgt; fw += wgt;
  }
  if (fw > 1e-3) flameCentroid.set(fcx / fw, fcy / fw, fcz / fw);
  flameSys.g.attributes.position.needsUpdate = true;
  flameSys.g.attributes.aColor.needsUpdate = true;
  flameSys.g.attributes.aSize.needsUpdate = true;
  flameSys.g.attributes.aAlpha.needsUpdate = true;
}

/* ============================================================
   火星 —— 重力 + 空气阻力 + 近火处的热上升气流（羽流）
   ============================================================ */
const SPARK_N = 130;
const sparkSys = makeParticleSystem(SPARK_N, '0.15', THREE.AdditiveBlending);
const sparks = [];
for (let i = 0; i < SPARK_N; i++) sparks.push({ alive: false, life: 0, maxLife: 1 });
let sparkAcc = 0;

function spawnSpark(p, o) {
  p.alive = true;
  if (o) {                                   // 指定起点（加柴落点的迸溅）
    p.x = o.x + (Math.random() - 0.5) * 0.22;
    p.y = o.y + Math.random() * 0.15;
    p.z = o.z + (Math.random() - 0.5) * 0.22;
  } else {
    p.x = (Math.random() - 0.5) * 0.3;
    p.y = 0.3 + Math.random() * 0.5;
    p.z = (Math.random() - 0.5) * 0.3;
  }
  const a = Math.random() * Math.PI * 2;
  const lat = (0.2 + Math.random() * 0.8) * (o ? 1.7 : 1);
  p.vx = Math.cos(a) * lat;
  p.vy = (1.5 + Math.random() * 2.8) * (o ? 1.25 : 1);
  p.vz = Math.sin(a) * lat;
  p.life = 0;
  p.maxLife = 0.8 + Math.random() * 1.6;
  p.seed = Math.random() * 100;
}

function updateSparks(dt, t, flick) {
  const G = -9.8, DRAG = 0.45;
  // 加柴落点的火星迸溅
  while (burstQueue.length) {
    const b = burstQueue.pop();
    for (let k = 0; k < b.n; k++) {
      const p = sparks.find(s => !s.alive);
      if (!p) break;
      spawnSpark(p, b);
    }
  }
  sparkAcc += dt * P.sparkRate * (0.6 + 0.8 * flick) * (1 + 0.5 * fuel); // 火越旺，迸出的火星越多
  while (sparkAcc >= 1) {
    sparkAcc -= 1;
    const p = sparks.find(s => !s.alive);
    if (p) spawnSpark(p);
  }
  for (let i = 0; i < SPARK_N; i++) {
    const p = sparks[i];
    if (!p.alive) { sparkSys.al[i] = 0; continue; }
    p.life += dt;
    const f = p.life / p.maxLife;
    if (f >= 1 || (p.y < 0.03 && p.vy < 0)) { p.alive = false; sparkSys.al[i] = 0; continue; }

    const plume = 11 * Math.exp(-p.y / 1.1);          // 热羽流升力随高度指数衰减
    p.vy += (G + plume) * dt;                          // 重力 + 上升气流
    const k = Math.max(0, 1 - DRAG * dt);              // 空气阻力
    p.vx *= k; p.vy *= k; p.vz *= k;
    p.vx += Math.sin(t * 5 + p.seed) * 0.6 * dt;       // 气流扰动
    p.vz += Math.cos(t * 4 + p.seed) * 0.6 * dt;
    p.vx += windVX * 0.9 * dt;                         // 阵风吹偏火星（矢量）
    p.vz += windVZ * 0.9 * dt;
    p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;

    sparkSys.pos[i*3] = p.x; sparkSys.pos[i*3+1] = p.y; sparkSys.pos[i*3+2] = p.z;
    const cool = 1 - f;                                // 余烬冷却变暗变红
    sparkSys.col[i*3] = 1.0; sparkSys.col[i*3+1] = 0.35 + 0.45 * cool; sparkSys.col[i*3+2] = 0.05 + 0.18 * cool;
    sparkSys.sz[i] = 0.035 + 0.03 * cool;
    sparkSys.al[i] = cool * (0.55 + 0.45 * Math.sin(t * 35 + p.seed * 9));   // 闪烁
  }
  sparkSys.g.attributes.position.needsUpdate = true;
  sparkSys.g.attributes.aColor.needsUpdate = true;
  sparkSys.g.attributes.aSize.needsUpdate = true;
  sparkSys.g.attributes.aAlpha.needsUpdate = true;
}

/* ============================================================
   烟 —— 缓慢上升、受风漂移、膨胀消散
   ============================================================ */
const SMOKE_N = 55;
const smokeSys = makeParticleSystem(SMOKE_N, '0.42', THREE.NormalBlending);
const smokes = [];
for (let i = 0; i < SMOKE_N; i++) smokes.push({ alive: false });
let smokeAcc = 0;
const WIND = new THREE.Vector3(0.22, 0, 0.08);

function spawnSmoke(p) {
  p.alive = true;
  p.x = (Math.random() - 0.5) * 0.25;
  p.y = 0.9 + Math.random() * 0.3;
  p.z = (Math.random() - 0.5) * 0.25;
  p.vx = (Math.random() - 0.5) * 0.1;
  p.vy = 0.55 + Math.random() * 0.35;
  p.vz = (Math.random() - 0.5) * 0.1;
  p.life = 0;
  p.maxLife = 3.2 + Math.random() * 2.2;
  p.seed = Math.random() * 100;
}

function updateSmoke(dt, t) {
  WIND.set(windVX, 0, windVZ);                      // 烟随风向矢量漂移
  // 刚投入未引燃的湿柴大量冒烟 + 雨打火堆腾起的水汽（rainNow）
  smokeAcc += dt * P.smokeRate * (1 + 0.35 * fuel + 1.3 * Math.max(0, fuelTarget - fuel) + 2.0 * rainNow);
  while (smokeAcc >= 1) {
    smokeAcc -= 1;
    const p = smokes.find(s => !s.alive);
    if (p) spawnSmoke(p);
  }
  for (let i = 0; i < SMOKE_N; i++) {
    const p = smokes[i];
    if (!p.alive) { smokeSys.al[i] = 0; continue; }
    p.life += dt;
    const f = p.life / p.maxLife;
    if (f >= 1) { p.alive = false; smokeSys.al[i] = 0; continue; }

    p.vx += (WIND.x - p.vx) * 0.4 * dt;               // 风的拖拽使烟逐渐随风漂移
    p.vz += (WIND.z - p.vz) * 0.4 * dt;
    p.vx += Math.sin(t * 0.9 + p.seed) * 0.15 * dt;
    p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;

    smokeSys.pos[i*3] = p.x; smokeSys.pos[i*3+1] = p.y; smokeSys.pos[i*3+2] = p.z;
    const warm = Math.max(0, 1 - f * 3);              // 底部的烟被火从下方微微照亮
    smokeSys.col[i*3] = 0.30 + 0.25 * warm;
    smokeSys.col[i*3+1] = 0.29 + 0.12 * warm;
    smokeSys.col[i*3+2] = 0.32 + 0.03 * warm;
    smokeSys.sz[i] = 0.35 + f * 2.2;                  // 膨胀
    smokeSys.al[i] = Math.min(f * 5, 1) * (1 - f) * 0.16;
  }
  smokeSys.g.attributes.position.needsUpdate = true;
  smokeSys.g.attributes.aColor.needsUpdate = true;
  smokeSys.g.attributes.aSize.needsUpdate = true;
  smokeSys.g.attributes.aAlpha.needsUpdate = true;
}

/* ============================================================
   细雨 —— 受风斜落的雨丝，强度 P.rain；雨中火更弱、更多水汽、雾更浓
   ============================================================ */
const RAIN_N = 360;
const rainSys = makeParticleSystem(RAIN_N, '0.30', THREE.AdditiveBlending);
const rainP = [];
for (let i = 0; i < RAIN_N; i++) rainP.push({ x: 0, y: -1, z: 0, vy: 0, init: false });
function spawnRain(p) {
  p.x = (Math.random() * 2 - 1) * 16;      // 火堆周围 ±16m 的雨幕
  p.y = 6 + Math.random() * 8;
  p.z = (Math.random() * 2 - 1) * 16;
  p.vy = -(6.5 + Math.random() * 5);       // 下落速度
  p.init = true;
}
let rainHidden = false;
function updateRain(dt) {
  if (rainNow < 0.01) {                     // 无雨：清零一次后跳过，省开销
    if (!rainHidden) { for (let i = 0; i < RAIN_N; i++) rainSys.al[i] = 0; rainSys.g.attributes.aAlpha.needsUpdate = true; rainHidden = true; }
    return;
  }
  rainHidden = false;
  const active = Math.floor(RAIN_N * rainNow);
  for (let i = 0; i < RAIN_N; i++) {
    if (i >= active) { rainSys.al[i] = 0; continue; }
    const p = rainP[i];
    if (!p.init) spawnRain(p);
    p.y += p.vy * dt;
    p.x += windVX * 1.6 * dt;               // 雨被风吹斜
    p.z += windVZ * 1.6 * dt;
    if (p.y < 0.03) spawnRain(p);           // 落地回收
    rainSys.pos[i*3] = p.x; rainSys.pos[i*3+1] = p.y; rainSys.pos[i*3+2] = p.z;
    rainSys.col[i*3] = 0.52; rainSys.col[i*3+1] = 0.60; rainSys.col[i*3+2] = 0.78;
    rainSys.sz[i] = 0.07;
    rainSys.al[i] = 0.42 * rainNow;
  }
  rainSys.g.attributes.position.needsUpdate = true;
  rainSys.g.attributes.aColor.needsUpdate = true;
  rainSys.g.attributes.aSize.needsUpdate = true;
  rainSys.g.attributes.aAlpha.needsUpdate = true;
}

/* ============================================================
   环境生物：萤火虫、飞蛾、树影摇动（远处动物叫声在 startAudio 内）
   ============================================================ */
// 萤火虫：中景缓慢蜿蜒漂浮的黄绿冷光，各自独立明灭（远离火光处更显）
const FIREFLY_N = 42;
const fireflySys = makeParticleSystem(FIREFLY_N, '0.25', THREE.AdditiveBlending);
const fireflies = [];
{
  const rng = mulberry32(91);
  for (let i = 0; i < FIREFLY_N; i++) {
    const a = rng() * Math.PI * 2, r = 3.5 + rng() * 8;
    fireflies.push({
      x: Math.cos(a) * r, y: 0.3 + rng() * 1.6, z: Math.sin(a) * r,
      phase: rng() * 6.28, blink: 0.4 + rng() * 1.0, sp: 0.12 + rng() * 0.2,
      seed: rng() * 100, drift: rng() * 6.28
    });
    fireflySys.col[i*3] = 0.7; fireflySys.col[i*3+1] = 1.0; fireflySys.col[i*3+2] = 0.32;   // 黄绿（恒定）
  }
  fireflySys.g.attributes.aColor.needsUpdate = true;
}
function updateFireflies(dt, t) {
  for (let i = 0; i < FIREFLY_N; i++) {
    const p = fireflies[i];
    p.x += Math.sin(t * 0.4 + p.seed) * p.sp * dt + windVX * 0.12 * dt;       // 蜿蜒漂移 + 随风
    p.z += Math.cos(t * 0.33 + p.seed * 1.3) * p.sp * dt + windVZ * 0.12 * dt;
    p.y += Math.sin(t * 0.6 + p.drift) * 0.12 * dt;
    p.y = Math.max(0.25, Math.min(2.2, p.y));
    let glow = Math.max(0, Math.sin(t * p.blink + p.phase));                  // 明灭脉冲
    glow = glow * glow * glow;                                               // 亮起锐、熄灭缓
    const vis = Math.min(1, Math.max(0, (Math.hypot(p.x, p.z) - 1.6) / 3));  // 近火被压过
    fireflySys.pos[i*3] = p.x; fireflySys.pos[i*3+1] = p.y; fireflySys.pos[i*3+2] = p.z;
    fireflySys.sz[i] = 0.05 + 0.035 * glow;
    fireflySys.al[i] = glow * 0.9 * vis * (1 - 0.6 * rainNow);                // 雨天萤火稀疏
  }
  fireflySys.g.attributes.position.needsUpdate = true;
  fireflySys.g.attributes.aSize.needsUpdate = true;
  fireflySys.g.attributes.aAlpha.needsUpdate = true;
}

// 飞蛾：被提灯/火光吸引，不匀速盘旋扑飞的淡色身影
const moths = [];
{
  const mothTex = radialTexture(32, [
    [0, 'rgba(222,212,182,0.95)'], [0.5, 'rgba(168,158,128,0.4)'], [1, 'rgba(150,140,110,0)']
  ]);
  const fireTarget = new THREE.Vector3(0, 1.0, 0);
  for (let i = 0; i < 5; i++) {
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({
      map: mothTex, transparent: true, depthWrite: false, opacity: 0, fog: true
    }));
    spr.scale.set(0.09, 0.06, 1);
    scene.add(spr);
    moths.push({
      spr, target: i < 3 ? campLight.position : fireTarget,    // 3 只绕提灯、2 只绕火
      ang: Math.random() * 6.28, rad: 0.22 + Math.random() * 0.4,
      ph: Math.random() * 6.28, yph: Math.random() * 6.28, seed: Math.random() * 100
    });
  }
}
function updateMoths(dt, t) {
  for (const m of moths) {
    m.ang += (0.8 + 0.6 * Math.sin(t * 1.3 + m.seed)) * dt;                  // 不匀速盘旋
    const r = m.rad * (1 + 0.3 * Math.sin(t * 2.1 + m.ph));
    m.spr.position.set(
      m.target.x + Math.cos(m.ang) * r + Math.sin(t * 5 + m.seed) * 0.04,
      m.target.y + 0.12 * Math.sin(t * 3.3 + m.yph) + 0.05 * Math.sin(t * 7 + m.seed),
      m.target.z + Math.sin(m.ang) * r + Math.cos(t * 4.6 + m.seed) * 0.04
    );
    m.spr.material.opacity = 0.5 + 0.4 * Math.sin(t * 9 + m.seed);           // 翅扑明灭
  }
}

// 树影摇动：松树随瞬时风速轻摆，silhouette 与投影一起晃动
function updateTreeSway(dt, t) {
  for (const tr of trees) {
    const sway = tr.amp * (0.4 + 2.6 * windNow);
    tr.g.rotation.x = Math.sin(t * tr.sp + tr.ph) * sway;
    tr.g.rotation.z = Math.cos(t * tr.sp * 0.8 + tr.ph) * sway * 0.7;
  }
}

updateScales();

/* ============================================================
   加柴交互：木柴抛物线飞入（重力 + 翻滚）→ 落点迸火星、冒烟、
   闷响 → 燃料模型：先闷烧冒烟再引燃，~50s 烧尽
   ============================================================ */
const addedLogs = [];
const burstQueue = [];
let fuel = 3;            // 已引燃的燃料（驱动火势）——初始柴堆，会随燃烧消耗
let fuelTarget = 3;      // 现存木柴总量（含闷烧中的新柴）
let fireDrive = 1;       // P.fireScale × 燃料加成，每帧更新
let fireHealth = 1;      // 0（余烬）→ 1（旺火）：由现存燃料决定，需持续添柴维持
let collapseAmt = 0;     // 柴堆坍塌/炭化进度（平滑跟随燃尽程度，驱动树皮变黑与下沉）
let crackleBoostUntil = 0;

function tossLog() {
  // 柴堆上限：先移除最旧的一根已落定的柴
  if (addedLogs.length >= 5) {
    const idx = addedLogs.findIndex(o => o.state === 'rest');
    if (idx >= 0) {
      const old = addedLogs.splice(idx, 1)[0];
      scene.remove(old.mesh);
      old.mesh.geometry.dispose();
      old.mesh.material.dispose();
    }
  }
  // 从镜头一侧抛入，抛物线命中火心附近
  const dl = Math.hypot(camera.position.x, camera.position.z) || 1;
  const sx = (camera.position.x / dl) * 2.6 + (Math.random() - 0.5) * 0.8;
  const sz = (camera.position.z / dl) * 2.6 + (Math.random() - 0.5) * 0.8;
  const sy = 1.05;
  const tx = (Math.random() - 0.5) * 0.4, tz = (Math.random() - 0.5) * 0.4;
  const ty = 0.30 + Math.random() * 0.12;
  const T = 0.6 + Math.random() * 0.15;     // 飞行时间，反解初速度
  const mesh = new THREE.Mesh(
    new THREE.CylinderGeometry(0.05, 0.062, 0.68 + Math.random() * 0.16, 8),
    new THREE.MeshStandardMaterial({ color: 0x3a2512, roughness: 0.9 })   // 新柴：独立新鲜木色，不随炭化变黑
  );
  mesh.castShadow = true;
  mesh.position.set(sx, sy, sz);
  scene.add(mesh);
  addedLogs.push({
    mesh, state: 'fly', restY: ty,
    vel: new THREE.Vector3((tx - sx) / T, (ty - sy) / T + 4.9 * T, (tz - sz) / T),
    spin: new THREE.Vector3((Math.random() - 0.5) * 9, (Math.random() - 0.5) * 5, (Math.random() - 0.5) * 9)
  });
}

function updateAddedLogs(dt) {
  for (const l of addedLogs) {
    if (l.state !== 'fly') continue;
    l.vel.y -= 9.8 * dt;                     // 重力
    l.mesh.position.addScaledVector(l.vel, dt);
    l.mesh.rotation.x += l.spin.x * dt;      // 翻滚
    l.mesh.rotation.y += l.spin.y * dt;
    l.mesh.rotation.z += l.spin.z * dt;
    if (l.vel.y < 0 && l.mesh.position.y <= l.restY) landLog(l);
  }
}

function landLog(l) {
  l.state = 'rest';
  l.mesh.position.y = l.restY;
  // 随机一个近水平的安放姿态
  const yaw = Math.random() * Math.PI * 2;
  l.mesh.quaternion.setFromUnitVectors(
    new THREE.Vector3(0, 1, 0),
    new THREE.Vector3(Math.cos(yaw), (Math.random() - 0.5) * 0.5, Math.sin(yaw)).normalize()
  );
  fuelTarget = Math.min(6, fuelTarget + 1.4);          // 新柴补充燃料（上限提高）
  fuel = Math.min(fuelTarget, fuel + 0.6);             // 即时小幅引燃 → 添柴瞬间火势一窜
  // 落点特效：火星迸溅 + 烟尘
  burstQueue.push({ x: l.mesh.position.x, y: l.restY + 0.1, z: l.mesh.position.z, n: 24 });
  for (let k = 0; k < 6; k++) {
    const s = smokes.find(o => !o.alive);
    if (s) {
      spawnSmoke(s);
      s.x = l.mesh.position.x + (Math.random() - 0.5) * 0.2;
      s.z = l.mesh.position.z + (Math.random() - 0.5) * 0.2;
      s.y = l.restY + 0.15;
    }
  }
  if (audio) {
    audio.playThud();                                        // 闷响 + 湿柴嘶声
    crackleBoostUntil = audio.ctx.currentTime + 2.5;         // 爆裂声高发期
  }
}

/* ============================================================
   营火互动：烤棉花糖 / 煮水 / 点燃火把 / 投掷松果
   动作共享火势与天气状态，模型均使用简单几何体，避免额外资源请求
   ============================================================ */
const activityStatus = document.getElementById('activityStatus');
const actionButtons = {
  roast: document.getElementById('roastBtn'),
  kettle: document.getElementById('kettleBtn'),
  torch: document.getElementById('torchBtn'),
  pinecone: document.getElementById('pineconeBtn')
};
const UP_AXIS = new THREE.Vector3(0, 1, 0);
let activityMessageKey = '';
let activityMessageUntil = 0;
let activityUiTimer = 0;

function showActivityMessage(key, seconds = 2.8) {
  activityMessageKey = key;
  activityMessageUntil = performance.now() + seconds * 1000;
}

function cameraSidePosition(radius, height) {
  const p = camera.position.clone().sub(FIRE_POS);
  p.y = 0;
  if (p.lengthSq() < 0.001) p.set(0, 0, 1);
  return p.normalize().multiplyScalar(radius).setY(height);
}

function aimRod(group, rod, tip, from, to) {
  const dir = to.clone().sub(from);
  const len = Math.max(0.001, dir.length());
  group.position.copy(from);
  group.quaternion.setFromUnitVectors(UP_AXIS, dir.multiplyScalar(1 / len));
  rod.position.y = len * 0.5;
  rod.scale.y = len;
  tip.position.y = len;
}

function makeBeamBetween(a, b, radius, material, segments = 8) {
  const dir = b.clone().sub(a);
  const mesh = new THREE.Mesh(
    new THREE.CylinderGeometry(radius, radius, dir.length(), segments),
    material
  );
  mesh.position.copy(a).add(b).multiplyScalar(0.5);
  mesh.quaternion.setFromUnitVectors(UP_AXIS, dir.normalize());
  mesh.castShadow = true;
  return mesh;
}

function disposeObject3D(root) {
  root.traverse(o => {
    if (o.geometry) o.geometry.dispose();
    if (o.material) {
      const mats = Array.isArray(o.material) ? o.material : [o.material];
      for (const m of mats) m.dispose();
    }
  });
  root.removeFromParent();
}

function startRoasting() {

  marshmallowAction.progress = 0;

  marshmallowAction.roastHand.copy(view).multiplyScalar(1.65).addScaledVector(side, 0.82).setY(1.0);
  marshmallowAction.startTip.copy(view).multiplyScalar(1.0).addScaledVector(side, 0.58).setY(0.96);
  marshmallowAction.roastTip.copy(side).multiplyScalar(0.28).addScaledVector(view, 0.08).setY(0.78);

function updateMarshmallow(dt, t) {
  const a = marshmallowAction;
  if (a.state === 'idle') return;
  a.time += dt;
  const hand = new THREE.Vector3();
  const tip = new THREE.Vector3();
  if (a.state === 'approach') {
    const k = THREE.MathUtils.smoothstep(Math.min(1, a.time / 0.8), 0, 1);
    hand.lerpVectors(a.startHand, a.roastHand, k);
    tip.lerpVectors(a.startTip, a.roastTip, k);
    if (k >= 1) { a.state = 'roast'; a.time = 0; }
  } else if (a.state === 'roast') {
    hand.copy(a.roastHand);
    tip.copy(a.roastTip);
    tip.x += Math.sin(t * 1.8) * 0.08;
    tip.z += Math.cos(t * 1.4) * 0.06;
    // 火弱或下雨时需要更久；旺火下约 7 秒烤好
    const heat = (0.25 + 1.05 * fireHealth) * (1 - 0.35 * rainNow);
    a.progress = Math.min(1, a.progress + dt * heat / 7);
    marshmallowMat.color.copy(new THREE.Color(0xfff2d8)).lerp(new THREE.Color(0xa94d18), a.progress);
    marshmallowMat.emissiveIntensity = 0.16 * a.progress * fireHealth;
    if (a.progress >= 1) {
      a.state = 'return';
      a.time = 0;
      showActivityMessage('roastDone');
    }
  } else {
    const k = THREE.MathUtils.smoothstep(Math.min(1, a.time / 0.8), 0, 1);
    hand.lerpVectors(a.roastHand, a.startHand, k);
    tip.lerpVectors(a.roastTip, a.startTip, k);
    if (k >= 1) {
      a.state = 'idle';
      skewer.visible = false;
      return;
    }
  }
  aimRod(skewer, skewerStick, marshmallow, hand, tip);
  marshmallow.rotation.y = t * 1.65;
}

  kettleAction.state = 'placing';
  kettleAction.time = 0;

  kettle.visible = true;

function updateSteam(t, strength) {
  for (let i = 0; i < steamPuffs.length; i++) {
    const puff = steamPuffs[i];
    const phase = (t * (0.34 + i * 0.015) + i / steamPuffs.length) % 1;
    puff.position.set(
      0.08 + Math.sin(t * 1.5 + i * 2.1) * 0.07 * phase,
      0.58 + phase * 0.85,
      Math.cos(t * 1.2 + i) * 0.045 * phase
    );
    puff.scale.setScalar(0.55 + phase * 1.8);
    puff.material.opacity = Math.sin(Math.PI * phase) * 0.24 * strength;
  }
}

function updateKettle(dt, t) {
  const a = kettleAction;
  if (a.state === 'idle') return;
  a.time += dt;
  if (a.state === 'placing') {
    const k = THREE.MathUtils.smoothstep(Math.min(1, a.time / 0.75), 0, 1);
    kettle.position.lerpVectors(a.start, a.rest, k);
    kettle.position.y += Math.sin(Math.PI * k) * 0.28;
    if (k >= 1) { a.state = 'heating'; a.time = 0; }
  } else if (a.state === 'heating') {
    const heat = (0.22 + 1.1 * fireHealth) * (1 - 0.45 * rainNow);
    a.progress = Math.min(1, a.progress + dt * heat / 9);
    kettleMat.emissiveIntensity = a.progress * 0.18 * fireHealth;
    updateSteam(t, THREE.MathUtils.smoothstep(a.progress, 0.42, 1));
    if (a.progress >= 1) {
      a.state = 'ready';
      a.time = 0;
      showActivityMessage('kettleDone', 4);
    }
  } else if (a.state === 'ready') {
    updateSteam(t, 1);
    if (a.time >= 4) { a.state = 'removing'; a.time = 0; }
  } else {
    const k = THREE.MathUtils.smoothstep(Math.min(1, a.time / 0.8), 0, 1);
    kettle.position.lerpVectors(a.rest, a.start, k);
    kettle.position.y += Math.sin(Math.PI * k) * 0.25;
    updateSteam(t, 1 - k);
    if (k >= 1) {
      a.state = 'idle';
      kettle.visible = false;
      kettleRig.visible = false;
      kettleMat.emissiveIntensity = 0;
    }
  }
}

// 4) 松果：从镜头侧抛入，落入火堆后短暂燃烧并补充少量燃料
const pinecones = [];
function throwPinecone() {
  const group = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({
    color: 0x3f2512, roughness: 0.95, emissive: 0xff4a0a, emissiveIntensity: 0
  });
  const core = new THREE.Mesh(new THREE.DodecahedronGeometry(0.12, 1), mat);
  core.scale.set(0.76, 1.28, 0.76);
  core.castShadow = true;
  group.add(core);
  for (let i = -2; i <= 2; i++) {
    const ring = new THREE.Mesh(new THREE.TorusGeometry(0.085 - Math.abs(i) * 0.008, 0.014, 5, 9), mat);
    ring.rotation.x = Math.PI / 2;
    ring.position.y = i * 0.055;
    group.add(ring);
  }
  const start = cameraSidePosition(2.5, 1.15);
  const target = new THREE.Vector3((Math.random() - 0.5) * 0.35, 0.2, (Math.random() - 0.5) * 0.35);
  const T = 0.58 + Math.random() * 0.14;
  group.position.copy(start);
  scene.add(group);
  pinecones.push({
    group, mat, state: 'fly', age: 0,
    vel: new THREE.Vector3(
      (target.x - start.x) / T,
      (target.y - start.y) / T + 4.9 * T,
      (target.z - start.z) / T
    ),
    spin: new THREE.Vector3(6 + Math.random() * 6, 4 + Math.random() * 5, 5 + Math.random() * 7)
  });
  while (pinecones.length > 9) disposeObject3D(pinecones.shift().group);
  showActivityMessage('pineconeThrown', 1.6);
}

function updatePinecones(dt) {
  for (let i = pinecones.length - 1; i >= 0; i--) {
    const p = pinecones[i];
    p.age += dt;
    if (p.state === 'fly') {
      p.vel.y -= 9.8 * dt;
      p.group.position.addScaledVector(p.vel, dt);
      p.group.rotation.x += p.spin.x * dt;
      p.group.rotation.y += p.spin.y * dt;
      p.group.rotation.z += p.spin.z * dt;
      if (p.vel.y < 0 && p.group.position.y <= 0.19) {
        p.state = 'burn';
        p.age = 0;
        p.group.position.y = 0.19;
        p.mat.emissiveIntensity = 1.1;
        burstQueue.push({ x: p.group.position.x, y: 0.3, z: p.group.position.z, n: 15 });
        fuelTarget = Math.min(6, fuelTarget + 0.22);
        fuel = Math.min(fuelTarget, fuel + 0.08);
        for (let k = 0; k < 2; k++) {
          const s = smokes.find(o => !o.alive);
          if (s) {
            spawnSmoke(s);
            s.x = p.group.position.x;
            s.y = 0.28;
            s.z = p.group.position.z;
          }
        }
        if (audio) audio.playThud();
      }
    } else {
      p.mat.color.lerp(new THREE.Color(0x100804), Math.min(1, dt * 0.8));
      p.mat.emissiveIntensity = Math.max(0, (1 - p.age / 7) * (0.55 + flick));
      p.group.scale.setScalar(Math.max(0.25, 1 - p.age / 9));
      if (p.age >= 7.5) {
        disposeObject3D(p.group);
        pinecones.splice(i, 1);
      }
    }
  }
}

function refreshActionButtons() {
  const roastActive = marshmallowAction.state !== 'idle';
  const kettleActive = kettleAction.state !== 'idle';
  const torchBusy = torchAction.state === 'lighting' || torchAction.state === 'returning';
  actionButtons.roast.disabled = roastActive;
  actionButtons.kettle.disabled = kettleActive;
  actionButtons.torch.disabled = torchBusy;
  actionButtons.roast.classList.toggle('active', roastActive);
  actionButtons.kettle.classList.toggle('active', kettleActive);
  actionButtons.torch.classList.toggle('active', torchAction.state === 'lit' || torchBusy);
  actionButtons.roast.textContent = roastActive
    ? tr('roastProgress')(Math.round(marshmallowAction.progress * 100)) : tr('roast');
  actionButtons.kettle.textContent = kettleActive
    ? tr('kettleProgress')(Math.round(kettleAction.progress * 100)) : tr('kettle');
  actionButtons.torch.textContent = torchAction.state === 'lit' ? tr('extinguishTorch') : tr('lightTorch');
  actionButtons.pinecone.textContent = tr('throwPinecone');
}

function updateActivityUi(dt) {
  activityUiTimer += dt;
  if (activityUiTimer < 0.1) return;
  activityUiTimer = 0;
  refreshActionButtons();
  const active = [];
  if (marshmallowAction.state === 'roast') {
    active.push(tr('roastStatus')(Math.round(marshmallowAction.progress * 100)));
  }
  if (kettleAction.state === 'heating') {
    active.push(tr('kettleStatus')(Math.round(kettleAction.progress * 100)));
  }
  if (torchAction.state === 'lighting' || torchAction.state === 'returning') {
    active.push(tr('torchLighting'));
  }
  if (active.length) {
    activityStatus.textContent = active.join(' · ');
  } else if (activityMessageKey && performance.now() < activityMessageUntil) {
    activityStatus.textContent = tr(activityMessageKey);
  } else {
    activityStatus.textContent = '';
  }
}

function updateCampActivities(dt, t) {
  updateMarshmallow(dt, t);
  updateKettle(dt, t);
  updateTorch(dt, t);
  updatePinecones(dt);
  updateActivityUi(dt);
}

actionButtons.torch.addEventListener('click', toggleTorch);
actionButtons.pinecone.addEventListener('click', () => {

// 每帧校验视口：窗口隐藏时浏览器报告 0 尺寸且恢复可见不一定触发 resize 事件
let viewW = -1, viewH = -1;
function fitViewport() {
  const w = innerWidth, h = innerHeight;
  if (w === viewW && h === viewH) return;
  if (w < 2 || h < 2) return;
  viewW = w; viewH = h;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  updateScales();
}
fitViewport();

/* ============================================================
   声音 —— 全部程序化合成，符合物理规律：
   · PositionalAudio + distanceModel 'inverse'：振幅 ∝ 1/r（声强 ∝ 1/r²）
   · HRTF 双耳定位：转动镜头时左右声像随之变化
   · 空气对高频的吸收：距离越远，低通截止频率越低（声音越闷）
   · 音源 = 棕噪声轰鸣 + 带通嘶声 + 泊松过程随机触发的噼啪爆裂
   ============================================================ */
const listener = new THREE.AudioListener();
camera.add(listener);

const fireSound = new THREE.PositionalAudio(listener);
fireSound.position.copy(FIRE_POS);
fireGroup.add(fireSound);

let audio = null;   // 启动后保存所有需要逐帧更新的音频节点

function makeNoiseBuffer(ctx, seconds, brown) {
  const n = Math.floor(seconds * ctx.sampleRate);
  const buf = ctx.createBuffer(1, n, ctx.sampleRate);
  const d = buf.getChannelData(0);
  let last = 0;
  for (let i = 0; i < n; i++) {
    const w = Math.random() * 2 - 1;
    if (brown) { last = (last + 0.02 * w) / 1.02; d[i] = last * 3.5; }
    else d[i] = w;
  }
  return buf;
}

// 短促的爆裂声样本：白噪声 × 锐利指数衰减包络
function makeCrackleBuffer(ctx) {
  const dur = 0.025 + Math.random() * 0.05;
  const n = Math.floor(dur * ctx.sampleRate);
  const buf = ctx.createBuffer(1, n, ctx.sampleRate);
  const d = buf.getChannelData(0);
  const k = 6 + Math.random() * 10;
  for (let i = 0; i < n; i++) {
    d[i] = (Math.random() * 2 - 1) * Math.exp(-k * i / n * 4);
  }
  return buf;
}

function startAudio() {
  const ctx = listener.context;
  ctx.resume();
  listener.setMasterVolume(P.masterVol);

  // —— 定位声源参数（物理衰减模型）——
  fireSound.setRefDistance(2);          // 2 m 处为参考响度
  fireSound.setRolloffFactor(P.rolloff);
  fireSound.setDistanceModel('inverse');
  fireSound.panner.panningModel = 'HRTF';

  // 火焰总线 → 空气吸收低通 → 3D 定位面板
  const fireMix = ctx.createGain();
  fireMix.gain.value = 1.0;
  const airFilter = ctx.createBiquadFilter();
  airFilter.type = 'lowpass';
  airFilter.frequency.value = 12000;
  fireMix.connect(airFilter);
  fireSound.setNodeSource(airFilter);

  // 1) 低频轰鸣：棕噪声 + 低通
  const roarSrc = ctx.createBufferSource();
  roarSrc.buffer = makeNoiseBuffer(ctx, 8, true);
  roarSrc.loop = true;
  const roarLP = ctx.createBiquadFilter();
  roarLP.type = 'lowpass'; roarLP.frequency.value = 380; roarLP.Q.value = 0.5;
  const roarGain = ctx.createGain();
  roarGain.gain.value = 0.5;
  roarSrc.connect(roarLP).connect(roarGain).connect(fireMix);
  roarSrc.start();

  // 2) 嘶嘶声：白噪声 + 带通，缓慢起伏
  const hissSrc = ctx.createBufferSource();
  hissSrc.buffer = makeNoiseBuffer(ctx, 6, false);
  hissSrc.loop = true;
  const hissBP = ctx.createBiquadFilter();
  hissBP.type = 'bandpass'; hissBP.frequency.value = 2600; hissBP.Q.value = 0.8;
  const hissGain = ctx.createGain();
  hissGain.gain.value = 0.05;
  hissSrc.connect(hissBP).connect(hissGain).connect(fireMix);
  hissSrc.start();
  const hissLFO = ctx.createOscillator();
  hissLFO.frequency.value = 0.23;
  const hissLFOGain = ctx.createGain();
  hissLFOGain.gain.value = 0.022;
  hissLFO.connect(hissLFOGain).connect(hissGain.gain);
  hissLFO.start();

  // 3) 噼啪爆裂：泊松过程调度，随机音高/响度/频段
  const crackleVariants = Array.from({ length: 6 }, () => makeCrackleBuffer(ctx));
  let nextCrackle = ctx.currentTime + 0.1;
  function scheduleCrackles() {
    const horizon = ctx.currentTime + 0.3;
    // 刚加柴后的 2.5s 内爆裂声高发（拨动火堆会引发密集噼啪）
    const rate = P.crackleRate * (ctx.currentTime < crackleBoostUntil ? 3 : 1);
    if (rate < 0.1) { nextCrackle = horizon; return; }   // 滑到 0 时静音且不积压
    while (nextCrackle < horizon) {
      const src = ctx.createBufferSource();
      src.buffer = crackleVariants[(Math.random() * crackleVariants.length) | 0];
      src.playbackRate.value = 0.6 + Math.random() * 1.6;
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 900 + Math.random() * 4200;
      bp.Q.value = 0.9;
      const g = ctx.createGain();
      // 5% 概率出现响亮的爆裂声（真实篝火偶发的大噼啪）
      g.gain.value = Math.random() < 0.05 ? 0.7 + Math.random() * 0.5 : 0.06 + Math.random() * 0.3;
      src.connect(bp).connect(g).connect(fireMix);
      src.start(nextCrackle);
      src.stop(nextCrackle + 0.25);
      // 指数分布的间隔 → 泊松过程，平均 rate 次/秒
      nextCrackle += 0.02 + -Math.log(1 - Math.random()) / rate;
    }
  }
  const crackleTimer = setInterval(scheduleCrackles, 120);

  // 4) 环境风声（非定位，包围听者）：棕噪声 + 漂移的低通
  const windAudio = new THREE.Audio(listener);
  const windSrc = ctx.createBufferSource();
  windSrc.buffer = makeNoiseBuffer(ctx, 10, true);
  windSrc.loop = true;
  const windLP = ctx.createBiquadFilter();
  windLP.type = 'lowpass'; windLP.frequency.value = 240; windLP.Q.value = 0.6;
  const windGain = ctx.createGain();
  windGain.gain.value = 0.045;
  windSrc.connect(windLP).connect(windGain);
  windAudio.setNodeSource(windGain);
  windSrc.start();
  const windLFO = ctx.createOscillator();
  windLFO.frequency.value = 0.06;
  const windLFOGain = ctx.createGain();
  windLFOGain.gain.value = 0.025;
  windLFO.connect(windLFOGain).connect(windGain.gain);
  windLFO.start();

  // 5) 加柴音效：低频闷响 + 湿柴受热的嘶声短暂增强
  const thudBuf = ctx.createBuffer(1, Math.floor(0.2 * ctx.sampleRate), ctx.sampleRate);
  {
    const d = thudBuf.getChannelData(0);
    let last = 0;
    for (let i = 0; i < d.length; i++) {
      const wn = Math.random() * 2 - 1;
      last = (last + 0.04 * wn) / 1.04;
      d[i] = last * 6 * Math.exp(-i / d.length * 7);
    }
  }
  const playThud = () => {
    const src = ctx.createBufferSource();
    src.buffer = thudBuf;
    src.playbackRate.value = 0.85 + Math.random() * 0.3;
    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 260;
    const g = ctx.createGain();
    g.gain.value = 1.4;
    src.connect(lp).connect(g).connect(fireMix);
    src.start();
    const now = ctx.currentTime;
    hissGain.gain.setTargetAtTime(0.16, now, 0.25);
    hissGain.gain.setTargetAtTime(0.05, now + 1.2, 0.8);
  };

  // 7) 远处动物：夜枭低鸣（双声 hoo-hoo）+ 偶发蟋蟀虫鸣
  //    非定位、随机稀疏触发；经听者主增益 → 受总音量控制
  const critterBus = ctx.createGain();
  critterBus.gain.value = 0.5;
  critterBus.connect(listener.getInput());
  const playOwl = () => {
    const t0 = ctx.currentTime;
    for (let k = 0; k < 2; k++) {                       // 两声
      const base = 350 + Math.random() * 70;
      const o = ctx.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(base * 1.18, t0 + k * 0.5);
      o.frequency.exponentialRampToValueAtTime(base, t0 + k * 0.5 + 0.18);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t0 + k * 0.5);
      g.gain.exponentialRampToValueAtTime(0.16, t0 + k * 0.5 + 0.04);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + k * 0.5 + 0.34);
      const o2 = ctx.createOscillator(); o2.type = 'sine'; o2.frequency.value = base * 2;
      const g2 = ctx.createGain(); g2.gain.value = 0.05;
      o2.connect(g2).connect(g);
      o.connect(g).connect(critterBus);
      o.start(t0 + k * 0.5); o.stop(t0 + k * 0.5 + 0.4);
      o2.start(t0 + k * 0.5); o2.stop(t0 + k * 0.5 + 0.4);
    }
  };
  const playCricket = () => {
    const t0 = ctx.currentTime, n = 3 + (Math.random() * 4 | 0);
    for (let k = 0; k < n; k++) {                       // 一串短促颤鸣
      const ts = t0 + k * 0.13;
      const o = ctx.createOscillator(); o.type = 'triangle';
      o.frequency.value = 4200 + Math.random() * 600;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, ts);
      g.gain.exponentialRampToValueAtTime(0.05, ts + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, ts + 0.06);
      o.connect(g).connect(critterBus);
      o.start(ts); o.stop(ts + 0.08);
    }
  };
  const critterTimer = setInterval(() => {             // 每 8s 掷骰 → 平均十几秒一声
    const r = Math.random();
    if (r < 0.4) playOwl();
    else if (r < 0.85) playCricket();
  }, 8000);

  audio = { ctx, roarGain, airFilter, crackleTimer, critterTimer, windGain, playThud };
}

    shadowFlickTip: '火明かりの速い揺らぎ：石や薪の影が炎の動きに合わせてちらちら踊ります。0 = 影は安定',
    masterVol: '全体音量',
    crackleRate: 'パチパチ頻度 (回/s)',
    rolloff: '距離減衰係数',
    rolloffTip: '1 = 物理的に正しい 1/r 減衰。大きいほど減衰が速い',
    airAbsorb: '空気の高音吸収',
    airAbsorbTip: '距離が遠いほど高音が失われます。0 = オフ',
    gWeather: '天 気',
    rain: '小雨',
    rainTip: '雨の強さ：雨で火は弱まり、水蒸気が増え、霧が濃くなる。雨脚は風で斜めに',
    cloud: '雲量',
    cloudTip: '雲の厚さと月の隠れ具合：厚いほど月は暗く、雲は不透明に',
    moonPhase: '月相',
    moonPhaseTip: '月相角（度）：0≈満月、90≈上弦、138 標準的な三日月、180≈新月',
    moonInt: '月光の強さ',
    fog: '霧の濃さ',
    exposure: '露出',
    hudFuel: (ft, fx) => ` · 燃料 +${ft}（火力 ×${fx}）`,
    hud: (d, w, wm, fuel) =>
      `焚き火まで r = ${d} m · 瞬間風速 ${w} m/s（平均 ${wm}）${fuel}\n` +
      `音の減衰：振幅 ∝ 1/r（音の強さ ∝ 1/r²）· 高音は空気が吸収\n` +
      `光の減衰：decay = 2（逆二乗の法則）`
  }
};

// 初始语言：按浏览器语言偏好自动选择（navigator.languages 从高到低逐项匹配）
// 顶部按钮可临时切换，但默认始终跟随浏览器设置，不做本地持久化
function detectLang() {
  const prefs = (navigator.languages && navigator.languages.length)
    ? navigator.languages : [navigator.language || ''];
  for (const p of prefs) {
    const s = p.toLowerCase();
    if (s.startsWith('zh')) return 'zh';
    if (s.startsWith('ja')) return 'ja';
    if (s.startsWith('en')) return 'en';
  }
  return 'en';   // 不在支持列表内时回落英文
}
let lang = detectLang();
// 注意：命名为 tr 而非 t，避免与主循环 step(dt, t) 的时间参数 t 冲突
function tr(key) { return I18N[lang][key] ?? I18N.zh[key] ?? key; }

// 绑定注册表：切换语言时统一重写 textContent / title
const boundTexts = [], boundTips = [];
function bindText(el, key) { boundTexts.push({ el, key }); el.textContent = tr(key); }
function bindTip(el, key)  { boundTips.push({ el, key });  el.title = tr(key); }
bindText(document.getElementById('ovTitle'), 'ovTitle');
bindText(document.getElementById('ovEnter'), 'ovEnter');
bindText(document.getElementById('ovHint'), 'ovHint');
bindText(document.getElementById('addLog'), 'addLog');
bindText(document.getElementById('panelTitle'), 'panelTitle');

const langBtns = [...document.querySelectorAll('#langSwitch button')];
function applyLang(l) {
  lang = l;
  document.documentElement.lang = { zh: 'zh-CN', en: 'en', ja: 'ja' }[l];
  document.title = tr('title');
  for (const b of boundTexts) b.el.textContent = tr(b.key);
  for (const b of boundTips) b.el.title = tr(b.key);
  for (const btn of langBtns) btn.classList.toggle('active', btn.dataset.lang === l);
  refreshActionButtons();
  hudTimer = 1;   // 让 HUD 在下一帧立即用新语言重绘
}
for (const btn of langBtns) btn.addEventListener('click', () => applyLang(btn.dataset.lang));

/* ============================================================
   启动遮罩
   ============================================================ */
const overlay = document.getElementById('overlay');
overlay.addEventListener('click', () => {
  if (!audio) startAudio();
  overlay.classList.add('hidden');
}, { once: true });

/* ============================================================
   主循环
   ============================================================ */
const clock = new THREE.Clock();
const hud = document.getElementById('hud');
let flick = 0.5;
let lightFlick = 0.5;
const lightBase = new THREE.Vector3().copy(FIRE_POS);   // 光源慢分量：低通跟随火焰质心
const lightJit  = new THREE.Vector3();                  // 光源快分量：OU 随机抖动 → 影子闪动
let windNow = 0.22;   // 瞬时风速（标量幅度，含阵风）
let windDir = 0.5;    // 风向（弧度，缓慢漂移）
let windVX = 0.19, windVZ = 0.10;   // 风矢量 = windNow×(cos,sin)，供火焰/火星/烟/雨共用
let rainNow = 0, cloudNow = 0.25;   // 平滑后的天气量（追随 P.rain / P.cloud）
let lastMoonPhase = -1;             // 月相变化时才重算太阳方向
let hudTimer = 0;

function animate() {
  requestAnimationFrame(animate);
  step(Math.min(clock.getDelta(), 0.05), clock.elapsedTime);
}

function step(dt, t) {
  fitViewport();
  // 火光闪烁：随机游走 + 回归均值（驱动火焰/火星/声音的快速抖动）
  flick += (Math.random() - 0.5) * dt * 14;
  flick += (0.5 - flick) * dt * 5;
  flick = Math.max(0, Math.min(1, flick));
  // 燃料燃烧模型：新柴先闷烧（fuel 落后于 fuelTarget，期间大量冒烟），
  // 引燃后火势增强，随后以 ~50s 时间常数缓慢烧尽
  // 燃料燃烧模型：木柴随燃烧被消耗（火越旺烧得越快），不添柴则火势跌回余烬
  fuelTarget *= Math.exp(-dt / 38 * (0.7 + 0.5 * P.fireScale));
  if (fuelTarget < 0.005) fuelTarget = 0;
  fuel += (fuelTarget - fuel) * Math.min(1, dt * 0.5);
  fireHealth = fuel / (fuel + 0.8);                       // 0（余烬）→ ~1（旺火），饱和曲线
  fireDrive = P.fireScale * (0.26 + 1.05 * fireHealth);   // 无柴时降到余烬强度，需续柴维持
  // 柴堆炭化与坍塌：随燃尽程度（1-fireHealth）渐进，平滑跟随
  collapseAmt += ((1 - fireHealth) - collapseAmt) * Math.min(1, dt * 0.5);
  barkMat.color.copy(BARK_FRESH).lerp(BARK_CHAR, collapseAmt);   // 树皮渐黑
  for (const L of teepeeLogs) {                           // 内端下沉、teepee 渐塌
    L.group.quaternion.copy(L.baseQuat).slerp(L.flatQuat, collapseAmt * 0.7);
    L.group.position.y = L.baseY - collapseAmt * 0.05;
  }
  updateAddedLogs(dt);

  // 火光亮度闪烁：响应越快，影子的明暗闪动越明显
  // （shadowFlick = 0 退回缓慢呼吸；= 1 时贴近 flick 的快速抖动）
  lightFlick += (flick - lightFlick) * Math.min(1, dt * (4 + 14 * P.shadowFlick));
  fireLight.intensity = 48 * (0.72 + 0.42 * lightFlick) * fireDrive;
  fireFill.intensity = fireLight.intensity * 0.28;   // 无影补光同步呼吸，影楔始终被填亮

  // 阵风：均值回归随机过程（OU），波动幅度与平均风速成正比。
  // 恒定风只让火焰静态倾斜；阵风才让火焰和影子持续摆动
  windNow += (P.wind - windNow) * 1.6 * dt + (Math.random() - 0.5) * P.wind * 3.5 * Math.sqrt(dt);
  windNow = Math.max(0, Math.min(windNow, P.wind * 2.5 + 0.02));

  // —— 天气系统 ——
  windDir += (Math.random() - 0.5) * dt * 0.4;                 // 风向缓慢漂移
  windVX = windNow * Math.cos(windDir);                        // 风矢量（火焰/火星/烟/雨共用）
  windVZ = windNow * Math.sin(windDir);
  rainNow += (P.rain - rainNow) * Math.min(1, dt * 0.6);       // 雨/云量平滑跟随滑块
  cloudNow += (P.cloud - cloudNow) * Math.min(1, dt * 0.5);
  fireLight.intensity *= (1 - 0.34 * rainNow);                 // 雨打火堆：火光减弱
  fireFill.intensity *= (1 - 0.34 * rainNow);
  scene.fog.density = P.fog + rainNow * 0.018 + cloudNow * 0.004;   // 雨/云加浓雾
  if (P.moonPhase !== lastMoonPhase) { setMoonPhase(P.moonPhase); lastMoonPhase = P.moonPhase; }
  for (const c of clouds) {                                    // 云层横向漂移 + 遮月加厚
    c.off += c.speed * (0.6 + windNow) * dt;
    if (c.off > 240) c.off -= 480;
    c.sprite.position.copy(c.base).addScaledVector(moonSide, c.off);
    c.sprite.material.opacity = Math.min(0.95, c.baseOp * (0.5 + 1.5 * cloudNow));
  }
  moonLight.intensity = P.moonInt * (1 - 0.7 * cloudNow);      // 云厚则月光与月面压暗
  if (moonMat)  moonMat.uniforms.uDim.value = 1 - 0.7 * cloudNow;
  if (moonHalo) moonHalo.material.opacity = 1 - 0.6 * cloudNow;
  // 提灯：稳定暖光中带极轻摇曳
  const lanternFlick = 0.9 + 0.07 * Math.sin(t * 6.3) + 0.03 * Math.sin(t * 23.1);
  campLight.intensity = 4.5 * lanternFlick;
  if (lanternGlowMat) lanternGlowMat.emissiveIntensity = 2.4 * lanternFlick;
  charMat.emissiveIntensity = (0.35 + 1.35 * fireHealth) * (0.8 + 0.55 * flick);   // 炭随火势冷却变暗
  emberGlow.material.opacity = (0.3 + 0.55 * fireHealth) * (0.6 + 0.5 * flick);
  for (const e of emberBed) {
    e.mat.emissiveIntensity = e.base * (0.55 + 0.45 * flick + 0.3 * Math.sin(t * e.speed + e.phase));
  }

  updateFlames(dt, t, flick);
  updateSparks(dt, t, flick);
  updateSmoke(dt, t);
  updateRain(dt);
  updateFireflies(dt, t);
  updateMoths(dt, t);
  updateTreeSway(dt, t);
  updateCampActivities(dt, t);

  // 影子运动 = 慢分量 + 快分量
  // 慢分量：光源低通跟随火焰质心，影子随风整体偏摆（限幅防止极端偏移）
  const kL = Math.min(1, dt * 4);
  lightBase.x += (THREE.MathUtils.clamp(flameCentroid.x, -0.5, 0.5) - lightBase.x) * kL;
  lightBase.y += (THREE.MathUtils.clamp(flameCentroid.y, 0.35, 1.0) - lightBase.y) * kL;
  lightBase.z += (THREE.MathUtils.clamp(flameCentroid.z, -0.5, 0.5) - lightBase.z) * kL;
  // 快分量：OU 随机抖动模拟火舌窜动，石头的影子随之闪动跳跃。
  // 竖直抖动改变影子长度、最显眼，幅度给得更大；火越旺（flick 高）闪动越强
  const sq = Math.sqrt(dt);
  lightJit.x += -lightJit.x * 9 * dt + (Math.random() - 0.5) * 0.7 * sq;
  lightJit.y += -lightJit.y * 9 * dt + (Math.random() - 0.5) * 1.0 * sq;
  lightJit.z += -lightJit.z * 9 * dt + (Math.random() - 0.5) * 0.7 * sq;
  lightJit.clampScalar(-0.13, 0.13);
  const jAmp = P.shadowFlick * (0.5 + 0.5 * flick);
  fireLight.position.set(
    lightBase.x + lightJit.x * jAmp,
    Math.max(0.36, lightBase.y + lightJit.y * jAmp),   // 光源不低于石顶，防影子甩到无穷远
    lightBase.z + lightJit.z * jAmp
  );
  fireFill.position.copy(fireLight.position);

  if (audio) {
    // 火势与音量联动
    audio.roarGain.gain.value = 0.42 * (0.75 + 0.5 * flick) * (0.45 + 0.55 * fireDrive);
    // 阵风掠过时风声随之增强；细雨叠加水汽嘶声
    audio.windGain.gain.value = Math.min(0.2, 0.025 + 0.055 * windNow + 0.09 * rainNow);
    // 空气吸收：高频随距离指数衰减
    const d = camera.position.distanceTo(FIRE_POS);
    const cutoff = 400 + 11600 * Math.exp(-d * P.airAbsorb / 30);
    audio.airFilter.frequency.setTargetAtTime(cutoff, audio.ctx.currentTime, 0.1);
  }

  hudTimer += dt;
  if (hudTimer > 0.25) {
    hudTimer = 0;
    const d = camera.position.distanceTo(FIRE_POS);
    const fuelStr = fuelTarget > 0.05
      ? tr('hudFuel')(fuelTarget.toFixed(1), (fireDrive / Math.max(0.01, P.fireScale)).toFixed(2)) : '';
    const lowStr = fireHealth < 0.32 ? '\n' + tr('lowFire') : '';
    hud.textContent = tr('hud')(d.toFixed(1), windNow.toFixed(2), P.wind.toFixed(2), fuelStr) + lowStr;
  }

  starMat.uniforms.uTime.value = t;   // 星光闪烁

  controls.update();
  renderer.render(scene, camera);
}
animate();

/* ============================================================
   参数滑块面板
   ============================================================ */
{
  // [文案键（同 P 中的键，标签随语言切换）, min, max, step, 自定义应用函数?, 是否有悬停提示（键 + 'Tip'）]
  const groups = [
    ['gFlame', [
      ['fireScale', 0.2, 2, 0.01],
      ['buoyancy', 0.5, 6, 0.1],
      ['sparkRate', 0, 60, 1],
      ['smokeRate', 0, 20, 0.5],
      ['wind', 0, 1.5, 0.01, null, true],
      ['shadowFlick', 0, 1, 0.01, null, true]
    ]],
    ['gSound', [
      ['masterVol', 0, 1, 0.01,
        v => { P.masterVol = v; listener.setMasterVolume(v); }],
      ['crackleRate', 0, 15, 0.5],
      ['rolloff', 0, 4, 0.05,
        v => { P.rolloff = v; fireSound.setRolloffFactor(v); }, true],
      ['airAbsorb', 0, 3, 0.05, null, true]
    ]],
    ['gWeather', [
      ['rain', 0, 1, 0.01, null, true],
      ['cloud', 0, 1, 0.01, null, true],
      ['moonPhase', 0, 180, 1, null, true]
    ]],
    ['gEnv', [
      ['moonInt', 0, 0.6, 0.01,
        v => { P.moonInt = v; moonLight.intensity = v; }],
      ['fog', 0, 0.04, 0.001,
        v => { P.fog = v; scene.fog.density = v; }],
      ['exposure', 0.4, 2, 0.01,
        v => { P.exposure = v; renderer.toneMappingExposure = v; }]
    ]]
  ];

  const body = document.getElementById('panelBody');
  for (const [gkey, items] of groups) {
    const h = document.createElement('div');
    h.className = 'pgroup';
    bindText(h, gkey);
    body.appendChild(h);
    for (const [key, min, max, stp, apply, hasTip] of items) {
      const row = document.createElement('label');
      row.className = 'prow';
      if (hasTip) bindTip(row, key + 'Tip');
      const name = document.createElement('span');
      name.className = 'pname';
      bindText(name, key);
      const val = document.createElement('span');
      val.className = 'pval';
      const input = document.createElement('input');
      input.type = 'range';
      input.min = min; input.max = max; input.step = stp; input.value = P[key];
      const dec = stp >= 1 ? 0 : stp >= 0.1 ? 1 : stp >= 0.01 ? 2 : 3;
      const show = v => { val.textContent = Number(v).toFixed(dec); };
      show(P[key]);
      input.addEventListener('input', () => {
        const v = parseFloat(input.value);
        (apply || (x => { P[key] = x; }))(v);
        show(v);
      });
      row.append(name, val, input);
      body.appendChild(row);
    }
  }

  const panel = document.getElementById('panel');
  const arrow = document.getElementById('panelArrow');
  document.getElementById('panelHead').addEventListener('click', () => {
    panel.classList.toggle('collapsed');
    arrow.textContent = panel.classList.contains('collapsed') ? '▸' : '▾';
  });
}

// 加柴按钮（短冷却防止连点刷屏）
{
  const btn = document.getElementById('addLog');
  btn.addEventListener('click', () => {
    tossLog();
    btn.disabled = true;
    setTimeout(() => { btn.disabled = false; }, 700);
  });
}

// 应用初始语言（标题、html lang、高亮对应按钮；面板标签已在构建时按当前语言写入）
applyLang(lang);

// 调试钩子：在 rAF 被节流的环境（如隐藏窗口）中手动驱动帧
window.__campfire = {
  renderer, scene, camera, step, P, applyLang, tossLog,
  startRoasting, startKettle, toggleTorch, throwPinecone,
  getFuel: () => ({ fuel, fuelTarget, fireHealth, fireDrive, collapseAmt }) };

addEventListener('resize', fitViewport);
</script>
